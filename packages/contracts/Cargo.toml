[package]
name = "zk-fingerprint"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
soroban-sdk = { version = "25.0.0", features = ["alloc"] }
soroban-poseidon = "25.0.1"

[dev-dependencies]
soroban-sdk = { version = "25.0.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 16
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true
